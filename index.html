<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML forms</title>
</head>
<body>
    <h1>Html Forms</h1>

    <form action="">
      <label for="username"> Username</label> 
      <input type="text" id="username" name="Username" placeholder="Username" required> 
      <br><br>
      <label for="email"> Enter email</label>
      <input type="email" id="email" name="email" placeholder="email" required>
      <br><br>
      <label for="password"> Enter password</label>
      <input type="password" id="password" name="password" placeholder="choose a password" required>

      <p> select your age</p>
      <input type="radio" name="age" value="0-25" id="option.1">
      <label for= "option.1">0-25</label>
      <input type="radio" name="age" value="26-50" id="option.2">
      <label for="option.2">26-50</label>
      <input type="radio" name="age" value="51+" id="option.3"
      <label for="option.3">51+</label>

      <br><br>
      <label for="">Security question</label>
      <select name="question" id="question">
      <option value="q1"> what is ur favourite colour of socks</option>
      <option value="q2"> what is the name of ur first pet</option>
      <option value="q3"> what is ur nickname</option>
      <option value="q4"> what is the name of ur primary school</option>
</select>

<br><br>

<label for="answer"> Security question answer</label>
<input type="text" id="answer" name="answer
">
<br><br>

<label for="bio"> your bio</label><br>
<textarea name="bio" id="bio" cols="30" rows="10" placeholder="about you..."></textarea>

<br><br>
<input type="submit" value="submit the form">

    </form>
</body>
</html>
